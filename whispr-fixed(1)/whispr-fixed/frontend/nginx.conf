server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Static frontend files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Voice files — served from Docker volume when available, fall back to backend
    location /uploads/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Accept-Ranges bytes;
        # Try to serve from volume; if file missing, proxy to backend
        try_files $uri @backend_uploads;
    }

    location @backend_uploads {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # REST API proxy — raise body size limit for voice upload (10 MB)
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 12m;
    }

    # Socket.IO — must handle both HTTP long-polling AND WebSocket upgrade
    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;

        proxy_buffering off;
        proxy_cache off;
    }
}
