<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Whispr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
  <div class="noise"></div>

  <!-- APP SHELL -->
  <div class="app" id="app">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <!-- Sidebar Header -->
      <div class="sidebar-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="24" fill="var(--accent)"/>
            <path d="M12 18C12 15.8 13.8 14 16 14H32C34.2 14 36 15.8 36 18V26C36 28.2 34.2 30 32 30H26L20 36V30H16C13.8 30 12 28.2 12 26V18Z" fill="white"/>
            <circle cx="19" cy="22" r="1.5" fill="var(--accent)"/>
            <circle cx="24" cy="22" r="1.5" fill="var(--accent)"/>
            <circle cx="29" cy="22" r="1.5" fill="var(--accent)"/>
          </svg>
          <span>whispr</span>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="notifBtn" title="Friend requests" onclick="togglePanel('requests')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span class="badge hidden" id="requestBadge">0</span>
          </button>
          <button class="icon-btn" title="Search users" onclick="togglePanel('search')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </button>
          <button class="icon-btn icon-btn-signout" title="Sign out" onclick="logout()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>

      <!-- My Profile -->
      <div class="my-profile" onclick="togglePanel('profile')">
        <div class="avatar-wrap">
          <div class="avatar" id="myAvatar"></div>
          <div class="online-dot"></div>
        </div>
        <div class="profile-info">
          <span class="username" id="myUsername">Loading…</span>
          <span class="status-text">Active now</span>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text3)"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>

      <!-- Friends List -->
      <div class="sidebar-section">
        <div class="section-title">
          <span>Friends</span>
          <span class="count" id="friendCount">0</span>
        </div>
        <div class="friends-list" id="friendsList">
          <div class="empty-state">
            <span>No friends yet — search to connect</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- PANELS (Search / Requests / Profile) -->
    <div class="panel-overlay hidden" id="panelOverlay" onclick="closePanel()"></div>

    <!-- Search Panel -->
    <div class="slide-panel hidden" id="searchPanel">
      <div class="panel-header">
        <h3>Find people</h3>
        <button class="icon-btn" onclick="closePanel()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="search-input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search by username…" oninput="handleSearch()" />
      </div>
      <div class="search-results" id="searchResults">
        <div class="empty-state">Type to search for users</div>
      </div>
    </div>

    <!-- Requests Panel -->
    <div class="slide-panel hidden" id="requestsPanel">
      <div class="panel-header">
        <h3>Friend Requests</h3>
        <button class="icon-btn" onclick="closePanel()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="requestsList">
        <div class="empty-state">No pending requests</div>
      </div>
    </div>

    <!-- Profile Panel -->
    <div class="slide-panel hidden" id="profilePanel">
      <div class="panel-header">
        <h3>My Profile</h3>
        <button class="icon-btn" onclick="closePanel()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="profile-panel-content">
        <div class="profile-avatar-big" id="profileAvatarBig"></div>
        <div class="profile-username" id="profileUsername"></div>
        <div class="bio-section">
          <label>Bio</label>
          <textarea id="bioInput" placeholder="Tell people about yourself…" maxlength="100"></textarea>
          <button class="btn-sm" onclick="saveBio()">Save</button>
        </div>
        <button class="btn-danger" onclick="logout()">Sign out</button>
      </div>
    </div>

    <!-- CHAT AREA -->
    <main class="chat-area" id="chatArea">
      <!-- Empty state -->
      <div class="chat-empty" id="chatEmpty">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="24" fill="var(--surface2)"/>
            <path d="M12 18C12 15.8 13.8 14 16 14H32C34.2 14 36 15.8 36 18V26C36 28.2 34.2 30 32 30H26L20 36V30H16C13.8 30 12 28.2 12 26V18Z" fill="var(--text3)"/>
          </svg>
        </div>
        <h2>Select a conversation</h2>
        <p>Choose a friend from the sidebar to start chatting</p>
      </div>

      <!-- Active Chat -->
      <div class="chat-view hidden" id="chatView">
        <!-- Chat Header -->
        <div class="chat-header">
          <button class="icon-btn mobile-back" onclick="showSidebar()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <div class="chat-partner-info">
            <div class="avatar sm" id="chatAvatar"></div>
            <div>
              <div class="chat-partner-name" id="chatPartnerName"></div>
              <div class="chat-partner-status" id="chatPartnerStatus"></div>
            </div>
          </div>
        </div>

        <!-- Messages -->
        <div class="messages-wrap" id="messagesWrap">
          <div class="messages" id="messages"></div>
        </div>

        <!-- Typing indicator -->
        <div class="typing-indicator hidden" id="typingIndicator">
          <span id="typingName"></span> is typing
          <div class="dots"><span></span><span></span><span></span></div>
        </div>

        <!-- Emoji / Sticker / GIF Picker Panel -->
        <div class="picker-panel hidden" id="pickerPanel">
          <div class="picker-tabs">
            <button class="picker-tab active" data-tab="emoji" onclick="switchPickerTab('emoji')">😊 Emoji</button>
            <button class="picker-tab" data-tab="stickers" onclick="switchPickerTab('stickers')">🎭 Stickers</button>
            <button class="picker-tab" data-tab="gifs" onclick="switchPickerTab('gifs')">GIF</button>
          </div>

          <!-- Emoji Tab -->
          <div class="picker-content active" id="tab-emoji">
            <div class="emoji-search-wrap">
              <input type="text" id="emojiSearch" placeholder="Search emoji…" oninput="filterEmoji(this.value)" />
            </div>
            <div class="emoji-categories" id="emojiCategories"></div>
            <div class="emoji-grid" id="emojiGrid"></div>
          </div>

          <!-- Stickers Tab -->
          <div class="picker-content" id="tab-stickers">
            <div class="sticker-search-wrap">
              <input type="text" id="stickerSearch" placeholder="Search stickers… (hi, love, miss you…)" oninput="filterStickers(this.value)" />
            </div>
            <div class="sticker-grid" id="stickerGrid"></div>
          </div>

          <!-- GIFs Tab -->
          <div class="picker-content" id="tab-gifs">
            <div class="gif-search-wrap">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="gif-search-icon"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" id="gifSearch" placeholder="Search GIFs…" oninput="handleGifSearch(this.value)" />
            </div>
            <div class="gif-cat-tabs" id="gifCatTabs"></div>
            <div class="gif-grid" id="gifGrid">
              <div class="picker-empty">Loading GIFs…</div>
            </div>
          </div>
        </div>

        <!-- Input -->
        <div class="message-input-area">
          <div class="input-toolbar">
            <button class="toolbar-btn" id="emojiBtn" onclick="togglePicker()" title="Emoji & Stickers">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            </button>
            <button class="toolbar-btn" onclick="openGifPicker()" title="GIFs">
              <span class="gif-label">GIF</span>
            </button>
          </div>

          <div class="input-wrap" id="inputWrap">
            <textarea
              id="messageInput"
              placeholder="Write a message…"
              rows="1"
              onkeydown="handleKeyDown(event)"
              oninput="handleTypingWithStickerSuggest(event)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4 20-7z"/></svg>
            </button>

            <!-- Voice button — click to toggle, hold to push-to-talk -->
            <button
              class="voice-btn" id="voiceBtn"
              title="Tap to record, hold for push-to-talk"
              type="button"
            >
              <!-- Mic icon (default) -->
              <svg class="voice-icon" id="voiceIconMic" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="22"/>
                <line x1="8" y1="22" x2="16" y2="22"/>
              </svg>
              <!-- Stop icon (while recording) -->
              <svg class="voice-icon hidden" id="voiceIconStop" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <rect x="4" y="4" width="16" height="16" rx="2"/>
              </svg>
              <!-- Ripple rings -->
              <span class="voice-ring voice-ring-1"></span>
              <span class="voice-ring voice-ring-2"></span>
              <span class="voice-ring voice-ring-3"></span>
            </button>
          </div>

          <!-- Recording in-progress bar -->
          <div class="voice-recording-bar hidden" id="voiceRecordingBar">
            <button class="voice-cancel-btn" onclick="cancelRecording()" title="Cancel">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
            <div class="voice-rec-dot"></div>
            <span class="voice-rec-label">Recording</span>
            <div class="voice-waveform" id="voiceWaveform">
              <canvas id="waveformCanvas" height="32"></canvas>
            </div>
            <span class="voice-timer" id="voiceTimer">0:00</span>
          </div>

          <!-- Sticker Suggestions Bar -->
          <div class="sticker-suggest-bar hidden" id="stickerSuggestBar"></div>
        </div>
      </div>
    </main>

  </div>

  <!-- Toast notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Connection lost banner -->
  <div id="connectionStatus" class="connection-banner hidden">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6s4-4 11-4 11 4 11 4"/><path d="M5 10s2.5-2.5 7-2.5 7 2.5 7 2.5"/><path d="M9 14s1-1 3-1 3 1 3 1"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    Reconnecting…
  </div>

  <script src="js/emoji.js"></script>
  <script src="js/stickers.js"></script>
  <script src="js/sticker-fx.js"></script>
  <script src="js/gifs.js"></script>
  <script src="js/app.js"></script>
  <script src="js/picker.js"></script>
  <script src="js/voice.js"></script>
</body>
</html>
