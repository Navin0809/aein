version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: whispr_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: whispr_secret_2026
      MONGO_INITDB_DATABASE: whispr
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - whispr_net

  mongo-express:
    image: mongo-express:1.0.2
    container_name: whispr_mongo_express
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: whispr_secret_2026
      ME_CONFIG_MONGODB_URL: mongodb://admin:whispr_secret_2026@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    networks:
      - whispr_net

  backend:
    build: ./backend
    container_name: whispr_backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      MONGO_URI: mongodb://admin:whispr_secret_2026@mongodb:27017/whispr?authSource=admin
      JWT_SECRET: whispr_jwt_ultra_secret_2026_key
      PORT: 3000
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads/voice
    ports:
      - "3000:3000"
    networks:
      - whispr_net
    volumes:
      - ./backend:/app
      - /app/node_modules
      - voice_data:/app/uploads/voice

  frontend:
    image: nginx:alpine
    container_name: whispr_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/public:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
      - voice_data:/usr/share/nginx/html/uploads/voice
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - whispr_net
    depends_on:
      - backend

volumes:
  mongo_data:
  voice_data:

networks:
  whispr_net:
    driver: bridge
